{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-center">
    <div class="card border-0 shadow-sm" style="max-width: 420px; width: 100%;">
        <div class="card-body p-4">
            <h4 class="fw-semibold mb-1">Set a new password</h4>
            <p class="text-muted small mb-4">Choose a new password for your account</p>

            <div id="resetError" class="alert alert-danger d-none"></div>
            <div id="resetSuccess" class="alert alert-success d-none"></div>

            <form id="resetForm">
                <div class="mb-3">
                    <label class="form-label fw-medium" for="newPassword">New password</label>
                    <input type="password" class="form-control" id="newPassword" placeholder="At least 6 characters" required minlength="6" />
                </div>

                <div class="mb-3">
                    <label class="form-label fw-medium" for="confirmPassword">Confirm new password</label>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Re-enter your new password" required minlength="6" />
                </div>

                <button type="submit" class="btn btn-primary w-100" id="resetSubmitBtn">Reset password</button>
            </form>

            <p class="text-center small text-muted mt-4 mb-0">
                <a href="/login">Back to log in</a>
            </p>
        </div>
    </div>
</div>

<script>
    const RESET_TOKEN = {{ token | tojson }};

    document.getElementById('resetForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const newPassword     = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const errorDiv         = document.getElementById('resetError');
        const successDiv       = document.getElementById('resetSuccess');
        const submitBtn        = document.getElementById('resetSubmitBtn');

        errorDiv.classList.add('d-none');
        successDiv.classList.add('d-none');

        if (newPassword !== confirmPassword) {
            errorDiv.textContent = "Passwords don't match.";
            errorDiv.classList.remove('d-none');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Resetting...';

        try {
            const res = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: RESET_TOKEN, new_password: newPassword })
            });

            const data = await res.json();

            if (!res.ok) {
                errorDiv.textContent = data.detail || 'This reset link is invalid or has expired.';
                errorDiv.classList.remove('d-none');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset password';
                return;
            }

            successDiv.textContent = data.message || 'Your password has been reset successfully.';
            successDiv.classList.remove('d-none');
            document.getElementById('resetForm').reset();
            document.getElementById('resetForm').style.display = 'none';

            // redirect to login after a short pause so the user sees the success message
            setTimeout(() => { window.location.href = '/login'; }, 2000);

        } catch (err) {
            errorDiv.textContent = 'Network error. Please try again.';
            errorDiv.classList.remove('d-none');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Reset password';
        }
    });
</script>
{% endblock %}
