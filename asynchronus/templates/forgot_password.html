{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-center">
    <div class="card border-0 shadow-sm" style="max-width: 420px; width: 100%;">
        <div class="card-body p-4">
            <h4 class="fw-semibold mb-1">Forgot your password?</h4>
            <p class="text-muted small mb-4">Enter your email and we'll send you a reset link</p>

            <div id="forgotError" class="alert alert-danger d-none"></div>
            <div id="forgotSuccess" class="alert alert-success d-none"></div>

            <form id="forgotForm">
                <div class="mb-3">
                    <label class="form-label fw-medium" for="email">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="you@example.com" required />
                </div>

                <button type="submit" class="btn btn-primary w-100" id="forgotSubmitBtn">Send reset link</button>
            </form>

            <p class="text-center small text-muted mt-4 mb-0">
                Remembered your password? <a href="/login">Log in</a>
            </p>
        </div>
    </div>
</div>

<script>
    document.getElementById('forgotForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const email      = document.getElementById('email').value.trim();
        const errorDiv   = document.getElementById('forgotError');
        const successDiv = document.getElementById('forgotSuccess');
        const submitBtn  = document.getElementById('forgotSubmitBtn');

        errorDiv.classList.add('d-none');
        successDiv.classList.add('d-none');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending...';

        try {
            const res = await fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const data = await res.json();

            if (!res.ok) {
                errorDiv.textContent = data.detail || 'Something went wrong. Please try again.';
                errorDiv.classList.remove('d-none');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send reset link';
                return;
            }

            // Always show the generic success message — backend intentionally
            // never reveals whether the email exists, so the UI shouldn't either.
            successDiv.textContent = data.message || 'If an account with that email exists, a reset link has been sent.';
            successDiv.classList.remove('d-none');
            document.getElementById('forgotForm').reset();
            submitBtn.disabled = false;
            submitBtn.textContent = 'Send reset link';

        } catch (err) {
            errorDiv.textContent = 'Network error. Please try again.';
            errorDiv.classList.remove('d-none');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Send reset link';
        }
    });
</script>
{% endblock %}
