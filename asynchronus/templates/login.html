{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-center">
    <div class="card border-0 shadow-sm" style="max-width: 420px; width: 100%;">
        <div class="card-body p-4">
            <h4 class="fw-semibold mb-1">Welcome back</h4>
            <p class="text-muted small mb-4">Log in to your account</p>

            <div id="loginError" class="alert alert-danger d-none"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label fw-medium" for="email">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="you@example.com" required />
                </div>

                <div class="mb-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <label class="form-label fw-medium mb-0" for="password">Password</label>
                        <a href="/forgot-password" class="small text-decoration-none">Forgot password?</a>
                    </div>
                    <input type="password" class="form-control mt-1" id="password" placeholder="••••••••" required />
                </div>

                <button type="submit" class="btn btn-primary w-100">Log In</button>
            </form>

            <p class="text-center small text-muted mt-4 mb-0">
                Don't have an account? <a href="/register">Register</a>
            </p>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('loginError');
        errorDiv.classList.add('d-none');

        // OAuth2PasswordRequestForm expects form-data, not JSON
        const formData = new URLSearchParams();
        formData.append('username', email);  // "username" field = email
        formData.append('password', password);

        try {
            const res = await fetch('/api/auth/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });

            const data = await res.json();

            if (!res.ok) {
                errorDiv.textContent = data.detail || 'Login failed.';
                errorDiv.classList.remove('d-none');
                return;
            }

            // save the token
            setToken(data.access_token);  // ← from auth.js

            // redirect to home
            window.location.href = '/';

        } catch (err) {
            errorDiv.textContent = 'Network error. Try again.';
            errorDiv.classList.remove('d-none');
        }
    });
</script>
{% endblock %}
